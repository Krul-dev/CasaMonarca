name: casa-monarca

services:
  web:
    build:
      context: ./Web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./Web:/app
      - ./Web/.env.dev:/app/.env:ro
      - web-node-modules:/app/node_modules
    depends_on:
      - api

  api:
    build:
      context: ./API
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./API:/var/www/html
      - ./API/.env.dev:/var/www/html/.env:ro
      - api-vendor:/var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:5.7.44
    environment:
      MYSQL_DATABASE: casamonarca_api
      MYSQL_USER: casamonarca
      MYSQL_PASSWORD: local_password
      MYSQL_ROOT_PASSWORD: local_root_password
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  web-node-modules:
  api-vendor:
  db-data:
