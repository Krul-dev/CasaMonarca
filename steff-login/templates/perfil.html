{% extends "base.html" %}
{% block titulo %}Mi Perfil — Casa Monarca{% endblock %}
{% block contenido %}
<div class="card">
    <h2>Mi perfil</h2>
    <p style="margin-bottom:5px;"><strong>Usuario:</strong> {{ session.nombre_usuario }}</p>
    <p style="margin-bottom:15px;"><strong>Rol:</strong> {{ session.rol }}</p>
</div>

<div class="card">
    <h2>Actualizar datos</h2>
    <form method="POST" action="{{ url_for('perfil') }}" style="max-width:450px;">
        <div class="form-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" value="{{ session.nombre }}" required>
        </div>
        <div class="form-group">
            <label for="contrasena">Nueva contrasena (dejar vacio = sin cambio)</label>
            <input type="password" id="contrasena" name="contrasena">
        </div>
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
    </form>
</div>
{% endblock %}
